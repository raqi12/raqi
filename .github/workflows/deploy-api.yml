name: Deploy API (NestJS)

on:
  push:
    branches: [main]
    paths:
      - 'raqi/**'
      - 'deploy/**'
      - '.github/workflows/deploy-api.yml'
  pull_request:
    paths:
      - 'raqi/**'
      - 'deploy/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST || '69.164.247.213' }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
  DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
  DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/var/www/raqi' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: raqi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: raqi/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ../api-artifact
          cp -r dist package.json package-lock.json Dockerfile scripts ../api-artifact/

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: raqi-api
          path: api-artifact/
          retention-days: 7

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DEPLOY_SSH_KEY: |
        -----BEGIN OPENSSH PRIVATE KEY-----
        b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
        QyNTUxOQAAACChxxDfIc5dAKNc29AVZrjJHxHRsg5rntabQy9NgNXMAgAAAJjsln8U7JZ/
        FAAAAAtzc2gtZWQyNTUxOQAAACChxxDfIc5dAKNc29AVZrjJHxHRsg5rntabQy9NgNXMAg
        AAAEC70Q9XVKArXZlXa1L8xyjBEYr8HTDIC/xJx06tAyqGf6HHEN8hzl0Ao1zb0BVmuMkf
        EdGyDmue1ptDL02A1cwCAAAAEnJhcWktZ2l0aHViLWRlcGxveQECAw==
        -----END OPENSSH PRIVATE KEY-----
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: raqi-api
          path: api-artifact

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Ensure directories on VPS
        run: |
          ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p $DEPLOY_ROOT $DEPLOY_ROOT/api $DEPLOY_ROOT/admin $DEPLOY_ROOT/uploads"

      - name: Install Docker if missing
        run: |
          ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "if ! command -v docker >/dev/null 2>&1; then \
               export DEBIAN_FRONTEND=noninteractive && \
               curl -fsSL https://get.docker.com | sh; \
             fi && \
             docker compose version >/dev/null 2>&1 || apt-get update && apt-get install -y docker-compose-plugin"

      - name: Install Node.js and PM2 if missing
        run: |
          ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "export DEBIAN_FRONTEND=noninteractive && \
             if ! command -v node >/dev/null 2>&1; then \
               curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && \
               apt-get install -y nodejs; \
             fi && \
             if ! command -v pm2 >/dev/null 2>&1; then \
               npm install -g pm2; \
             fi"

      - name: Install Nginx if missing
        run: |
          ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "export DEBIAN_FRONTEND=noninteractive && \
             command -v nginx >/dev/null 2>&1 || (apt-get update && apt-get install -y nginx)"

      - name: Configure Nginx upload limits
        run: |
          scp -i ~/.ssh/id_deploy -P "$DEPLOY_PORT" \
            deploy/nginx/raqi-upload-limits.conf \
            "$DEPLOY_USER@$DEPLOY_HOST:/etc/nginx/conf.d/raqi-upload-limits.conf"
          ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "/usr/sbin/nginx -t && systemctl reload nginx"

      - name: Upload deploy config
        run: |
          scp -i ~/.ssh/id_deploy -P "$DEPLOY_PORT" \
            deploy/docker-compose.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/docker-compose.yml"
          scp -i ~/.ssh/id_deploy -P "$DEPLOY_PORT" \
            deploy/ecosystem.config.cjs \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/ecosystem.config.cjs"
          scp -i ~/.ssh/id_deploy -P "$DEPLOY_PORT" \
            deploy/.env.example \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/.env.example"
          scp -i ~/.ssh/id_deploy -P "$DEPLOY_PORT" \
            deploy/scripts/pm2-restart.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/pm2-restart.sh"

      - name: Rsync API build to VPS
        run: |
          ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "pm2 stop raqi-api 2>/dev/null || true"
          rsync -avzr --delete \
            --exclude 'node_modules' \
            --exclude 'logs' \
            -e "ssh -i ~/.ssh/id_deploy -p $DEPLOY_PORT" \
            api-artifact/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/api/"

      - name: Start MongoDB and PM2 API
        run: |
          ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e && cd $DEPLOY_ROOT && \
             mkdir -p logs uploads/deposits && \
             chmod +x pm2-restart.sh 2>/dev/null || true && \
             if [ ! -f .env ]; then \
               cp .env.example .env; \
               echo 'Created .env from template — update JWT_SECRET on the VPS'; \
             fi && \
             docker compose stop api 2>/dev/null || true && \
             docker compose rm -f api 2>/dev/null || true && \
             docker compose up -d mongo && \
             cd api && npm ci --omit=dev && node scripts/verify-production-deps.js && cd .. && \
             pm2 delete wassetpay-api 2>/dev/null || true && \
             pm2 startOrReload ecosystem.config.cjs --update-env && \
             pm2 save && \
             for i in \$(seq 1 30); do \
               if curl -fsS http://127.0.0.1:3000/api/v1/health >/dev/null 2>&1; then \
                 curl -fsS http://127.0.0.1:3000/api/v1/health; \
                 pm2 status raqi-api; \
                 exit 0; \
               fi; \
               sleep 3; \
             done; \
             echo 'API health check failed'; pm2 logs raqi-api --lines 50 --nostream; exit 1"
